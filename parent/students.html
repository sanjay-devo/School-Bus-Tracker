<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Students - Parent</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Parent Panel</h2></div>
            <nav class="sidebar-nav">
                <a href="/parent/dashboard.html" class="nav-item"><span>Dashboard</span></a>
                <a href="/parent/students.html" class="nav-item active"><span>My Students</span></a>
                <a href="/parent/trip_history.html" class="nav-item"><span>Trip History</span></a>
                <a href="/parent/profile.html" class="nav-item"><span>Profile</span></a>
                <a href="/logout.html" class="nav-item"><span>Logout</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="content-header"><h1>My Students</h1></header>
            <div class="dashboard-content">
                <div class="card">
                    <div class="card-body" id="students-container">
                        <p class="text-muted">Loading students...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { requireRole } from '/assets/js/utils.js';
        import { getStudentsByParent } from '/assets/js/firebase-db.js';
        
        async function init() {
            const authUser = await requireRole('parent');
            if (!authUser) return;
            
            const students = await getStudentsByParent(authUser.user.uid);
            const container = document.getElementById('students-container');
            
            if (!students || students.length === 0) {
                container.innerHTML = '<p class="text-muted">No students assigned yet</p>';
                return;
            }
            
            let html = '<div class="table-responsive"><table class="table"><thead><tr><th>Name</th><th>Class</th><th>Roll</th><th>Bus</th></tr></thead><tbody>';
            students.forEach(s => {
                html += `<tr><td>${s.name || 'N/A'}</td><td>${s.class || 'N/A'}</td><td>${s.rollNumber || 'N/A'}</td><td>${s.busId || 'Not assigned'}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>

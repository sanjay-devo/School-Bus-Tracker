<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Signup - School Bus Tracker</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="/assets/images/bus-logo.png" alt="School Bus Tracker" onerror="this.style.display='none'">
                <h1>School Bus Tracker</h1>
                <p style="margin-top: 10px; color: #666;">Parent Registration</p>
            </div>
            
            <div id="error-alert" class="alert alert-error" style="display: none;"></div>
            <div id="success-alert" class="alert alert-success" style="display: none;"></div>
            
            <form id="signup-form" class="login-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="10-digit mobile number" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required>
                </div>
                
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="signup-btn">Create Account</button>
            </form>
            
            <div class="login-footer">
                <p>Already have an account? <a href="/index.html" style="color: var(--primary-color); text-decoration: none;">Login here</a></p>
                <p style="margin-top: 10px;">School Bus Tracker System</p>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { registerUser } from '/assets/js/firebase-auth.js';
        import { isValidEmail, isValidPhone, validatePasswordStrength, getAuthenticatedUser, getRoleDashboardPath } from '/assets/js/utils.js';
        
        // Check if already logged in
        window.addEventListener('load', async () => {
            const authUser = await getAuthenticatedUser();
            if (authUser && authUser.userData) {
                const dashboardPath = getRoleDashboardPath(authUser.userData.role);
                window.location.href = dashboardPath;
            }
        });
        
        // Signup form submission
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value.trim();
            const email = document.getElementById('email').value.trim();
            const mobile = document.getElementById('mobile').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            
            // Validation
            if (!fullname) {
                showError('Please enter your full name');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            if (!isValidPhone(mobile)) {
                showError('Please enter a valid 10-digit mobile number');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            const passwordValidation = validatePasswordStrength(password);
            if (!passwordValidation.isValid) {
                showError(passwordValidation.message);
                return;
            }
            
            // Disable button
            const signupBtn = document.getElementById('signup-btn');
            const originalText = signupBtn.textContent;
            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating account...';
            
            try {
                const result = await registerUser(email, password, {
                    name: fullname,
                    mobile: mobile,
                    role: 'parent'
                });
                
                if (!result.success) {
                    showError(result.error);
                    signupBtn.disabled = false;
                    signupBtn.textContent = originalText;
                    return;
                }
                
                // Show success and redirect
                showSuccess('Account created successfully! Redirecting...');
                setTimeout(() => {
                    window.location.href = '/parent/dashboard.html';
                }, 2000);
                
            } catch (error) {
                console.error('Signup error:', error);
                showError('Registration failed. Please try again.');
                signupBtn.disabled = false;
                signupBtn.textContent = originalText;
            }
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('error-alert');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            
            const successDiv = document.getElementById('success-alert');
            successDiv.style.display = 'none';
            
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('success-alert');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            
            const errorDiv = document.getElementById('error-alert');
            errorDiv.style.display = 'none';
        }
    </script>
</body>
</html>

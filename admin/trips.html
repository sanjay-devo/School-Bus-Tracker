<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Reports - Admin Panel</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Panel</h2></div>
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="nav-item"><span>Dashboard</span></a>
                <a href="/admin/drivers.html" class="nav-item"><span>Drivers</span></a>
                <a href="/admin/parents.html" class="nav-item"><span>Parents</span></a>
                <a href="/admin/students.html" class="nav-item"><span>Students</span></a>
                <a href="/admin/buses.html" class="nav-item"><span>Buses</span></a>
                <a href="/admin/routes.html" class="nav-item"><span>Routes</span></a>
                <a href="/admin/trips.html" class="nav-item active"><span>Trip Reports</span></a>
                <a href="/logout.html" class="nav-item"><span>Logout</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="content-header"><h1>Trip Reports</h1></header>
            <div class="dashboard-content">
                <div class="card">
                    <div class="card-body" id="trips-container">
                        <p class="text-muted">Loading trips...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { requireRole, formatDateTime } from '/assets/js/utils.js';
        import { getAllTrips } from '/assets/js/firebase-db.js';
        
        async function init() {
            await requireRole(['admin']);
            const trips = await getAllTrips();
            const container = document.getElementById('trips-container');
            
            if (!trips || trips.length === 0) {
                container.innerHTML = '<p class="text-muted">No trips found</p>';
                return;
            }
            
            let html = '<div class="table-responsive"><table class="table"><thead><tr><th>Trip ID</th><th>Bus ID</th><th>Driver ID</th><th>Type</th><th>Status</th><th>Started</th></tr></thead><tbody>';
            trips.forEach(t => {
                html += `<tr><td>${t.id}</td><td>${t.busId}</td><td>${t.driverId}</td><td>${t.type || 'N/A'}</td><td>${t.status || 'N/A'}</td><td>${formatDateTime(t.createdAt)}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>

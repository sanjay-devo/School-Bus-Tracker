<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drivers - Admin Panel</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Panel</h2></div>
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="nav-item"><span>Dashboard</span></a>
                <a href="/admin/drivers.html" class="nav-item active"><span>Drivers</span></a>
                <a href="/admin/parents.html" class="nav-item"><span>Parents</span></a>
                <a href="/admin/students.html" class="nav-item"><span>Students</span></a>
                <a href="/admin/buses.html" class="nav-item"><span>Buses</span></a>
                <a href="/admin/routes.html" class="nav-item"><span>Routes</span></a>
                <a href="/logout.html" class="nav-item"><span>Logout</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="content-header">
                <h1>Drivers Management</h1>
                <div class="header-actions">
                    <a href="#" onclick="openAddDialog()" class="btn btn-primary">+ Add Driver</a>
                </div>
            </header>
            
            <div class="dashboard-content">
                <div class="card">
                    <div class="card-body">
                        <div id="drivers-container">
                            <p class="text-muted">Loading drivers...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { requireRole } from '/assets/js/utils.js';
        import { getAllUsers, updateUserData } from '/assets/js/firebase-db.js';
        
        let authUser = null;
        
        async function init() {
            authUser = await requireRole(['admin']);
            if (!authUser) return;
            
            await loadDrivers();
        }
        
        async function loadDrivers() {
            try {
                const drivers = await getAllUsers('driver');
                const container = document.getElementById('drivers-container');
                
                if (!drivers || drivers.length === 0) {
                    container.innerHTML = '<p class="text-muted">No drivers found</p>';
                    return;
                }
                
                let html = '<div class="table-responsive"><table class="table"><thead><tr>';
                html += '<th>Name</th><th>Email</th><th>Mobile</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
                
                drivers.forEach(driver => {
                    html += `
                        <tr>
                            <td>${driver.name}</td>
                            <td>${driver.email}</td>
                            <td>${driver.mobile}</td>
                            <td><span class="badge ${driver.isActive ? 'badge-success' : 'badge-danger'}">${driver.isActive ? 'Active' : 'Inactive'}</span></td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="editDriver('${driver.uid}')">Edit</button>
                                <button class="btn btn-sm btn-danger" onclick="toggleStatus('${driver.uid}', ${driver.isActive})">
                                    ${driver.isActive ? 'Deactivate' : 'Activate'}
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                html += '</tbody></table></div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading drivers:', error);
                document.getElementById('drivers-container').innerHTML = '<p class="text-danger">Error loading drivers</p>';
            }
        }
        
        window.openAddDialog = function() {
            alert('Add Driver feature coming soon');
        };
        
        window.editDriver = function(uid) {
            alert('Edit Driver feature coming soon');
        };
        
        window.toggleStatus = async function(uid, isActive) {
            try {
                await updateUserData(uid, { isActive: !isActive });
                await loadDrivers();
            } catch (error) {
                alert('Error updating driver status');
            }
        };
        
        window.addEventListener('load', init);
    </script>
</body>
</html>

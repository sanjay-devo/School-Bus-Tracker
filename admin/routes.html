<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - Admin Panel</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Panel</h2></div>
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="nav-item"><span>Dashboard</span></a>
                <a href="/admin/drivers.html" class="nav-item"><span>Drivers</span></a>
                <a href="/admin/parents.html" class="nav-item"><span>Parents</span></a>
                <a href="/admin/students.html" class="nav-item"><span>Students</span></a>
                <a href="/admin/buses.html" class="nav-item"><span>Buses</span></a>
                <a href="/admin/routes.html" class="nav-item active"><span>Routes</span></a>
                <a href="/logout.html" class="nav-item"><span>Logout</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="content-header"><h1>Routes Management</h1></header>
            <div class="dashboard-content">
                <div class="card">
                    <div class="card-body" id="routes-container">
                        <p class="text-muted">Loading routes...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { requireRole } from '/assets/js/utils.js';
        import { getAllRoutes } from '/assets/js/firebase-db.js';
        
        async function init() {
            await requireRole(['admin']);
            const routes = await getAllRoutes();
            const container = document.getElementById('routes-container');
            
            if (!routes || routes.length === 0) {
                container.innerHTML = '<p class="text-muted">No routes found</p>';
                return;
            }
            
            let html = '<div class="table-responsive"><table class="table"><thead><tr><th>Route Name</th><th>Start Point</th><th>End Point</th><th>Distance</th><th>Stops</th></tr></thead><tbody>';
            routes.forEach(r => {
                html += `<tr><td>${r.routeName || 'N/A'}</td><td>${r.startPoint || 'N/A'}</td><td>${r.endPoint || 'N/A'}</td><td>${r.distance || 'N/A'} km</td><td>${r.stops ? r.stops.length : 0}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>

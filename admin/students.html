<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Admin Panel</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-header"><h2>Admin Panel</h2></div>
            <nav class="sidebar-nav">
                <a href="/admin/dashboard.html" class="nav-item"><span>Dashboard</span></a>
                <a href="/admin/drivers.html" class="nav-item"><span>Drivers</span></a>
                <a href="/admin/parents.html" class="nav-item"><span>Parents</span></a>
                <a href="/admin/students.html" class="nav-item active"><span>Students</span></a>
                <a href="/admin/buses.html" class="nav-item"><span>Buses</span></a>
                <a href="/admin/routes.html" class="nav-item"><span>Routes</span></a>
                <a href="/logout.html" class="nav-item"><span>Logout</span></a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="content-header"><h1>Students Management</h1></header>
            <div class="dashboard-content">
                <div class="card">
                    <div class="card-body" id="students-container">
                        <p class="text-muted">Loading students...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script type="module">
        import { requireRole } from '/assets/js/utils.js';
        import { getAllStudents } from '/assets/js/firebase-db.js';
        
        async function init() {
            await requireRole(['admin']);
            const students = await getAllStudents();
            const container = document.getElementById('students-container');
            
            if (!students || students.length === 0) {
                container.innerHTML = '<p class="text-muted">No students found</p>';
                return;
            }
            
            let html = '<div class="table-responsive"><table class="table"><thead><tr><th>Name</th><th>Class</th><th>Parent</th><th>Bus</th></tr></thead><tbody>';
            students.forEach(s => {
                html += `<tr><td>${s.name || 'N/A'}</td><td>${s.class || 'N/A'}</td><td>${s.parentId || 'N/A'}</td><td>${s.busId || 'N/A'}</td></tr>`;
            });
            html += '</tbody></table></div>';
            container.innerHTML = html;
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
